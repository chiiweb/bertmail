    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      font-family: 'Source Serif Pro', 'Inter', serif;
      
      background-color: #d4c5b0;
      background-image: 
        radial-gradient(circle at 20% 30%, rgba(160, 120, 80, 0.25) 0%, transparent 40%),
        radial-gradient(circle at 85% 15%, rgba(130, 90, 50, 0.2) 0%, transparent 45%),
        repeating-linear-gradient(45deg, rgba(100, 70, 40, 0.06) 0px, rgba(100, 70, 40, 0.06) 4px, transparent 4px, transparent 16px),
        linear-gradient(145deg, #ece0d0 0%, #cfbea6 100%);
      position: relative;
      box-shadow: inset 0 0 200px rgba(70, 40, 15, 0.2);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(circle at 0% 0%, rgba(200, 170, 130, 0.35) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(150, 110, 70, 0.3) 0%, transparent 45%),
        linear-gradient(135deg, transparent 20%, rgba(140, 100, 60, 0.1) 50%, transparent 80%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      top: 8%; right: 3%;
      width: 200px; height: 160px;
      background: radial-gradient(circle at 30% 20%, #ede0cf, #c8b59a);
      opacity: 0.35;
      transform: rotate(25deg);
      border-radius: 60% 40% 50% 50% / 45% 55% 45% 55%;
      box-shadow: 15px 20px 25px rgba(0,0,0,0.2), inset -3px -5px 10px #a38d74, inset 5px 5px 15px #fff2e2;
      filter: blur(2px);
      pointer-events: none;
      z-index: 2;
      border: 1px solid #b49b7e;
    }

    .extra-crumple {
      position: fixed;
      bottom: 5%; left: 2%;
      width: 160px; height: 130px;
      background: radial-gradient(circle at 70% 30%, #ddd0bd, #b8a58b);
      opacity: 0.3;
      transform: rotate(-15deg);
      border-radius: 40% 60% 70% 30% / 50% 40% 60% 50%;
      box-shadow: 10px 15px 20px rgba(0,0,0,0.15), inset 2px 3px 12px #f3e5d4;
      filter: blur(3px);
      pointer-events: none;
      z-index: 1;
    }

    .extra-crumple2 {
      position: fixed;
      top: 15%; left: 85%;
      width: 140px; height: 110px;
      background: radial-gradient(circle at 40% 60%, #d6c6b2, #b09b82);
      opacity: 0.25;
      transform: rotate(40deg);
      border-radius: 30% 70% 50% 50% / 60% 40% 60% 40%;
      box-shadow: 12px 18px 20px rgba(0,0,0,0.15);
      filter: blur(2.5px);
      pointer-events: none;
      z-index: 1;
    }

    .startup-overlay {
      position: fixed;
      inset: 0;
      background: rgba(20, 15, 8, 0.7);
      backdrop-filter: blur(12px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s;
      font-family: 'Inter', sans-serif;
    }

    .startup-card {
      max-width: 650px;
      width: 90%;
      background: #f3eadb;
      border-radius: 8px 60px 8px 60px;
      padding: 2.5rem 2.8rem;
      box-shadow: 0 40px 60px -10px #0f0a04, inset 0 0 0 2px #e6d5bf, inset 0 0 20px #fff3e0, 0 0 0 5px #9b8468;
      border: 1px solid #baa386;
      text-align: center;
      position: relative;
      animation: floatIn 0.5s;
    }

    @keyframes floatIn {
      0% { opacity: 0; transform: scale(0.92); }
      100% { opacity: 1; transform: scale(1); }
    }

    .startup-title {
      font-family: 'Playfair Display', serif;
      font-size: 3.2rem;
      font-weight: 900;
      color: #2c1e0e;
      text-shadow: 3px 3px 0 #dacbb8;
      margin-bottom: 0.5rem;
    }

    .tour-step {
      margin: 2rem 0;
      font-size: 1.2rem;
      color: #2f210f;
    }

    .tour-highlight {
      background: #dac2a8;
      padding: 10px 20px;
      border-radius: 40px;
      display: inline-block;
      margin: 15px 0;
      font-weight: 600;
    }

    .startup-btn {
      background: #3a2b19;
      border: 2px solid #bc9f7e;
      color: #f7ebdb;
      padding: 16px 36px;
      font-weight: 700;
      font-size: 1.3rem;
      border-radius: 4px 40px 4px 40px;
      box-shadow: 0 10px 0 #1f150a, 0 5px 15px rgba(0,0,0,0.3);
      transition: 0.08s linear;
      margin-top: 10px;
    }

    .startup-btn:active {
      transform: translateY(6px);
      box-shadow: 0 4px 0 #1f150a, 0 5px 12px rgba(0,0,0,0.2);
    }

    .app-wrapper {
      position: relative;
      z-index: 20;
      width: 100%;
      max-width: 1100px;
      transition: filter 0.3s;
    }

    .classifier-card {
      background: linear-gradient(145deg, #f9f0e2 0%, #eadbc9 100%);
      border-radius: 6px 60px 6px 60px;
      box-shadow: 
        0 35px 45px -12px #2a1e10,
        inset 0 0 0 1px #e7d5bd,
        inset 4px 4px 18px #fffbf4,
        inset -6px -6px 18px #bba990,
        0 0 0 5px #aa9176,
        0 0 0 7px #735e47;
      padding: 2.5rem 2.8rem;
      border: 1px solid #c8b094;
      transition: 0.2s;
    }

    .tools-row {
      display: flex;
      gap: 15px;
      margin: 20px 0 10px;
      flex-wrap: wrap;
    }

    .tool-chip {
      background: #cfbeaa;
      border: 1.5px solid #9b8468;
      padding: 8px 22px;
      border-radius: 30px;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      color: #281d0e;
      box-shadow: inset 0 1px 4px #f3e4d2, 0 4px 6px rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      gap: 10px;
      transition: 0.1s;
    }

    .tool-chip i { color: #60482e; }
    .tool-chip:hover {
      background: #bea991;
      transform: translateY(-2px);
    }

    .app-title {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      font-size: 3.8rem;
      background: linear-gradient(145deg, #1f150a, #5a4028);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      border-bottom: 3px double #9b8468;
      padding-bottom: 15px;
    }

    .example-section { display: flex; gap: 12px; margin: 1.2rem 0; align-items: center; }
    .example-btn {
      background: #ddcfbc; border: 1.5px solid #9b8468; padding: 8px 20px;
      border-radius: 2px 30px; font-weight: 600;
    }

    input, textarea {
      font-family: 'Source Serif Pro', serif;
      background: #fffbf2; border: 2px solid #b1997a;
      border-radius: 3px 30px; padding: 14px 20px; width: 100%;
    }

    .btn-classify {
      background: #3f2e1d; border: 1px solid #cfb698;
      color: #f3e6d6; padding: 16px 42px; border-radius: 2px 40px;
      font-weight: 700; font-size: 1.3rem;
    }

    .btn-classify:disabled {
      opacity: 0.5;
    }

    .spinner-box { background: #d9c6b1; padding: 12px 28px; border-radius: 2px 40px; display: flex; align-items: center; gap: 12px; }
    .dual-ring { width: 36px; height: 36px; border: 4px solid #bea88d; border-top-color: #2f1e0c; border-radius: 50%; animation: spin 0.9s infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .result-card { background: #eedfcb; border-radius: 2px 40px; padding: 1.5rem; margin-top: 1.8rem; }
    .spam-badge { color: #a1351a; } .ham-badge { color: #2a6e4a; }

    .hidden-ui { display: none; }

    .tooltip-wrapper { position: relative; display: inline-block; }
    .tooltip-wrapper .tooltip-text {
      visibility: hidden; opacity: 0; background: #2c1f10; color: #f0e1cf;
      padding: 6px 14px; border-radius: 30px; position: absolute; bottom: 150%;
      white-space: nowrap; transition: 0.15s; pointer-events: none;
    }
    .tooltip-wrapper:hover .tooltip-text { visibility: visible; opacity: 1; }
  </style>
</head>

    <div class="input-group">
      <label><i class="fas fa-filter"></i> Keywords</label>
      <input type="text" id="keywordsInput" placeholder="urgent, verify, account">
    </div>
    <div class="input-group">
      <label><i class="fas fa-envelope"></i> Email content</label>
      <textarea id="emailText" placeholder="Paste email..."></textarea>
      <div id="emailValidationMessage" style="color:#a64325;"></div>
    </div>

    <div style="display: flex; gap: 20px; align-items: center;">
      <button class="btn-classify" id="classifyBtn"><i class="fas fa-hourglass"></i> Classify with AI</button>
      <div id="loadingContainer"></div>
    </div>

    <div id="resultPanel" class="result-card" style="display: none;"></div>
    <hr style="border-top:2px dotted #9b8468;">
    <div style="font-family:Inter; opacity:0.8;">✦ crumpled wisdom · Qwen 80B AI ✦</div>
  </div>
</div>

<script>
  // ============================================
  // API KEY CONFIGURATION
  // ============================================
  // REPLACE THIS WITH YOUR OPENROUTER API KEY
  const OPENROUTER_API_KEY = 'YOUR_OPENROUTER_API_KEY_HERE';
  // ============================================

  (function(){
    'use strict';

    // ---------- TOUR ----------
    const overlay = document.getElementById('startupOverlay');
    const mainApp = document.getElementById('mainApp');
    const tourText = document.getElementById('tourText');
    const tourHighlight = document.getElementById('tourHighlight');
    const nextBtn = document.getElementById('tourNextBtn');
    const skipBtn = document.getElementById('tourSkipBtn');
    
    let tourStep = 1;
    const steps = [
      { text: '<i class="fas fa-newspaper"></i><br><span style="font-weight:700;">Step 1/3:</span> This atelier uses Qwen 80B to classify spam with real AI.', highlight: '✦ Crumpled paper · real AI ✦' },
      { text: '<i class="fas fa-flask"></i><br><span style="font-weight:700;">Step 2/3:</span> Test with examples — spam or legitimate.', highlight: '📜 Try the "Spam" or "Legit" buttons' },
      { text: '<i class="fas fa-tools"></i><br><span style="font-weight:700;">Step 3/3:</span> Extra tools: Clear, Paste, Stats. Ready to classify.', highlight: '✨ Begin your investigation ✨' }
    ];

    function updateTour() {
      if (tourStep <= 3) {
        tourText.innerHTML = steps[tourStep-1].text;
        tourHighlight.textContent = steps[tourStep-1].highlight;
        if (tourStep === 3) nextBtn.innerHTML = '<i class="fas fa-check"></i> Get Started';
        else nextBtn.innerHTML = '<i class="fas fa-arrow-right"></i> Next';
      }
    }

    function closeTour() {
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.style.display = 'none';
        mainApp.classList.remove('hidden-ui');
      }, 300);
    }

    nextBtn.addEventListener('click', () => {
      if (tourStep < 3) {
        tourStep++;
        updateTour();
      } else {
        closeTour();
      }
    });

    skipBtn.addEventListener('click', closeTour);
    updateTour();

    // ---------- DOM ELEMENTS ----------
    const senderInput = document.getElementById('senderInput');
    const keywordsInput = document.getElementById('keywordsInput');
    const emailTextarea = document.getElementById('emailText');
    const validationMsgDiv = document.getElementById('emailValidationMessage');
    const classifyBtn = document.getElementById('classifyBtn');
    const loadingContainer = document.getElementById('loadingContainer');
    const resultPanel = document.getElementById('resultPanel');

    // Examples
    const spamEx = { 
      sender: 'security@paypa1.com', 
      keywords: 'urgent, verify, suspended', 
      content: 'Dear Customer,\n\nWe have detected unusual activity on your account. Your access has been temporarily limited.\n\nPlease verify your identity immediately by clicking the link below:\nhttp://fake-paypal-verification.xyz\n\nFailure to verify within 24 hours will result in permanent account suspension.\n\nThank you,\nPayPal Security Team' 
    };
    const hamEx = { 
      sender: 'sarah.johnson@company.com', 
      keywords: 'meeting, agenda, project', 
      content: 'Hi Team,\n\nJust a reminder about our project sync tomorrow at 10:00 AM EST. I\'ve attached the latest mockups and the agenda for your review.\n\nPlease let me know if you have any additional topics to add.\n\nBest regards,\nSarah Johnson\nProduct Manager' 
    };

    // ---------- AI CLASSIFICATION ----------
    async function classifyWithAI(sender, keywords, emailContent) {
      const prompt = `You are a spam detection expert. Analyze the following email and determine if it is SPAM or HAM (legitimate).
      
Sender: ${sender || 'Unknown'}
Filter Keywords: ${keywords || 'None'}

Email Content:
${emailContent}

Respond with ONLY a JSON object in this exact format:
{
  "classification": "SPAM" or "HAM",
  "confidence": 0.XX,
  "reasoning": "Brief explanation"
}`;

      const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${OPENROUTER_API_KEY}`,
          'HTTP-Referer': window.location.origin,
          'X-Title': 'BERT Chronicle Spam Filter'
        },
        body: JSON.stringify({
          model: 'qwen/qwen3-next-80b-a3b-instruct:free',
          messages: [{ role: 'user', content: prompt }],
          temperature: 0.1,
          max_tokens: 150,
          response_format: { type: 'json_object' }
        })
      });

      if (!response.ok) {
        const error = await response.text();
        throw new Error(`API error: ${response.status}`);
      }

      const data = await response.json();
      const content = data.choices[0].message.content;
      
      let result;
      try {
        result = JSON.parse(content);
      } catch {
        const isSpam = content.toLowerCase().includes('spam');
        result = {
          classification: isSpam ? 'SPAM' : 'HAM',
          confidence: 0.85,
          reasoning: 'AI analysis completed'
        };
      }
      
      return {
        isSpam: result.classification === 'SPAM',
        confidence: result.confidence || 0.85,
        label: result.classification,
        reasoning: result.reasoning || ''
      };
    }

    function fallbackClassification(sender, keywords, text) {
      let score = 0;
      const lower = text.toLowerCase();
      const spamWords = ['urgent', 'verify', 'account', 'suspended', 'click', 'winner', 'prize', 'password', 'billing'];
      spamWords.forEach(w => { if (lower.includes(w)) score += 6; });
      if (sender.includes('paypal') || sender.includes('security')) score += 12;
      if (text.includes('http')) score += 5;
      if (lower.includes('meeting') || lower.includes('regards')) score -= 8;
      score = Math.min(100, Math.max(0, score));
      const isSpam = score >= 42;
      return {
        isSpam,
        confidence: isSpam ? 0.88 : 0.91,
        label: isSpam ? 'SPAM' : 'HAM',
        reasoning: 'Heuristic fallback (API unavailable)'
      };
    }

    // ---------- UI HELPERS ----------
    function validate(t) {
      if (!t?.trim()) return { valid: false, message: '⚠️ Email content cannot be empty.' };
      if (t.trim().length < 5) return { valid: false, message: '⚠️ Too short.' };
      return { valid: true, message: '' };
    }

    function updateValidation() {
      const v = validate(emailTextarea.value);
      validationMsgDiv.textContent = v.message;
    }

    emailTextarea.addEventListener('input', updateValidation);

    document.getElementById('spamExampleBtn').addEventListener('click', () => {
      senderInput.value = spamEx.sender;
      keywordsInput.value = spamEx.keywords;
      emailTextarea.value = spamEx.content;
      updateValidation();
      resultPanel.style.display = 'none';
    });

    document.getElementById('hamExampleBtn').addEventListener('click', () => {
      senderInput.value = hamEx.sender;
      keywordsInput.value = hamEx.keywords;
      emailTextarea.value = hamEx.content;
      updateValidation();
      resultPanel.style.display = 'none';
    });

    document.getElementById('clearTool').addEventListener('click', () => {
      senderInput.value = '';
      keywordsInput.value = '';
      emailTextarea.value = '';
      updateValidation();
      resultPanel.style.display = 'none';
    });

    document.getElementById('pasteTool').addEventListener('click', async () => {
      try {
        const text = await navigator.clipboard.readText();
        emailTextarea.value = text;
        updateValidation();
      } catch {
        alert('Clipboard access denied');
      }
    });

    document.getElementById('statsTool').addEventListener('click', () => {
      const len = emailTextarea.value.length;
      const words = emailTextarea.value.split(/\s+/).filter(w => w.length > 0).length;
      alert(`📊 Email stats:\n${len} characters\n${words} words`);
    });

    classifyBtn.addEventListener('click', async () => {
      const v = validate(emailTextarea.value);
      if (!v.valid) {
        validationMsgDiv.textContent = v.message;
        return;
      }

      validationMsgDiv.textContent = '';
      classifyBtn.disabled = true;
      loadingContainer.innerHTML = '<div class="spinner-box"><div class="dual-ring"></div><span>Qwen 80B analyzing…</span></div>';
      resultPanel.style.display = 'none';

      try {
        const sender = senderInput.value.trim();
        const keywords = keywordsInput.value.trim();
        const content = emailTextarea.value;

        let result;
        if (OPENROUTER_API_KEY && OPENROUTER_API_KEY !== 'YOUR_OPENROUTER_API_KEY_HERE') {
          result = await classifyWithAI(sender, keywords, content);
        } else {
          result = fallbackClassification(sender, keywords, content);
          result.reasoning = 'Using fallback (add API key for AI)';
        }
        
        const badge = result.isSpam ? 'spam-badge' : 'ham-badge';
        const confidencePercent = (result.confidence * 100).toFixed(1);
        
        resultPanel.innerHTML = `
          <div style="display:flex; align-items:center; gap:20px; flex-wrap:wrap;">
            <span style="font-size:2.5rem;">${result.isSpam ? '<i class="fas fa-exclamation-triangle"></i>' : '<i class="fas fa-check-circle"></i>'}</span>
            <span class="result-badge ${badge}" style="font-size:2rem;">${result.label}</span>
            <span style="background:#cfbeab; padding:8px 24px; border-radius:2px 40px; font-weight:700;">
              <i class="fas fa-chart-line"></i> ${confidencePercent}% confidence
            </span>
          </div>
          <div style="margin-top:15px; border-top:1px dashed #9a8267; padding-top:12px; font-style:italic;">
            <i class="fas fa-robot"></i> ${result.reasoning || 'AI-powered classification'}
          </div>
          <div style="margin-top:10px; font-size:0.9rem; opacity:0.7;">
            Sender: ${sender || '(none)'} | Keywords: ${keywords || '(none)'}
          </div>
        `;
        resultPanel.style.display = 'block';
      } catch (error) {
        resultPanel.innerHTML = `<div style="color:#a1351a;"><i class="fas fa-exclamation-circle"></i> Error: ${error.message}</div>`;
        resultPanel.style.display = 'block';
      } finally {
        classifyBtn.disabled = false;
        loadingContainer.innerHTML = '';
      }
    });

    updateValidation();
  })();
</script>
</body>
</html>
